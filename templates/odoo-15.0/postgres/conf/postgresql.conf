# PostgreSQL 15 — Tuned for Odoo 15.0 + 19.0 on Railway
# Target: Railway container (~512MB-8GB RAM)
# Serves: Odoo 15 (~64 conn) + Odoo 19 (~64 conn) + pgAdmin + maintenance

#------------------------------------------------------------------------------
# CONNECTION
#------------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 300

# Prevent connection leaks from Odoo workers
idle_in_transaction_session_timeout = 300s
statement_timeout = 600s
tcp_keepalives_idle = 600
tcp_keepalives_interval = 30
tcp_keepalives_count = 10

#------------------------------------------------------------------------------
# MEMORY (tuned for Railway container — shared across 2 Odoo instances)
#------------------------------------------------------------------------------
shared_buffers = 256MB
work_mem = 12MB
temp_buffers = 12MB
maintenance_work_mem = 128MB
effective_cache_size = 768MB
huge_pages = off

#------------------------------------------------------------------------------
# WAL & REPLICATION
#------------------------------------------------------------------------------
wal_level = replica
max_wal_senders = 5
max_replication_slots = 5
wal_keep_size = 512MB

# WAL archiving (enable when backup volume is attached)
archive_mode = off
# archive_command = 'test ! -f /backups/wal/%f && cp %p /backups/wal/%f'
# archive_timeout = 300

# Checkpoint tuning
checkpoint_completion_target = 0.9
min_wal_size = 128MB
max_wal_size = 512MB

#------------------------------------------------------------------------------
# WRITE-AHEAD LOG
#------------------------------------------------------------------------------
wal_buffers = 16MB
wal_compression = on

#------------------------------------------------------------------------------
# QUERY PLANNER
#------------------------------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 200

#------------------------------------------------------------------------------
# JIT (disable — Odoo queries are short, JIT adds overhead)
#------------------------------------------------------------------------------
jit = off

#------------------------------------------------------------------------------
# VACUUM & AUTOVACUUM
#------------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_delay = 10ms
autovacuum_vacuum_cost_limit = 1000

#------------------------------------------------------------------------------
# LOGGING (stdout for Railway container visibility)
#------------------------------------------------------------------------------
logging_collector = off
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0
log_timezone = 'Asia/Ho_Chi_Minh'

#------------------------------------------------------------------------------
# LOCALE & FORMATTING
#------------------------------------------------------------------------------
datestyle = 'iso, mdy'
timezone = 'Asia/Ho_Chi_Minh'
lc_messages = 'en_US.utf8'
lc_monetary = 'vi_VN.UTF-8'
lc_numeric = 'vi_VN.UTF-8'
lc_time = 'vi_VN.UTF-8'
default_text_search_config = 'pg_catalog.english'

#------------------------------------------------------------------------------
# PERFORMANCE FOR ODOO
#------------------------------------------------------------------------------
# Odoo uses a lot of JOINs
join_collapse_limit = 12
from_collapse_limit = 12

# Parallel query (PostgreSQL 15)
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2
