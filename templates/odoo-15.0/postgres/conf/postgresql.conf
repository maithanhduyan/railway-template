# PostgreSQL 15 — Tuned for Odoo 15.0 Multi-Tenant SaaS
# Target: 100-300 tenant databases on 4-16GB RAM VPS

#------------------------------------------------------------------------------
# CONNECTION
#------------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 200

#------------------------------------------------------------------------------
# MEMORY (adjust based on available RAM)
#------------------------------------------------------------------------------
# Railway container (~512MB-2GB RAM)
shared_buffers = 256MB
work_mem = 8MB
maintenance_work_mem = 128MB
effective_cache_size = 512MB

# Huge pages (disable on small VPS, enable on production)
huge_pages = try

#------------------------------------------------------------------------------
# WAL & REPLICATION
#------------------------------------------------------------------------------
wal_level = replica
max_wal_senders = 5
max_replication_slots = 5
wal_keep_size = 1GB

# WAL archiving
archive_mode = on
archive_command = 'test ! -f /backups/wal/%f && cp %p /backups/wal/%f'
archive_timeout = 300

# Checkpoint tuning
checkpoint_completion_target = 0.9
min_wal_size = 256MB
max_wal_size = 1GB

#------------------------------------------------------------------------------
# QUERY PLANNER
#------------------------------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 200

#------------------------------------------------------------------------------
# WRITE-AHEAD LOG
#------------------------------------------------------------------------------
wal_buffers = 64MB
wal_compression = on

#------------------------------------------------------------------------------
# VACUUM & AUTOVACUUM
#------------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_delay = 10ms

#------------------------------------------------------------------------------
# LOGGING (stdout for Railway container visibility)
#------------------------------------------------------------------------------
logging_collector = off
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0
log_timezone = 'Asia/Ho_Chi_Minh'

#------------------------------------------------------------------------------
# LOCALE & FORMATTING
#------------------------------------------------------------------------------
datestyle = 'iso, mdy'
timezone = 'Asia/Ho_Chi_Minh'
lc_messages = 'en_US.utf8'
lc_monetary = 'vi_VN.UTF-8'
lc_numeric = 'vi_VN.UTF-8'
lc_time = 'vi_VN.UTF-8'
default_text_search_config = 'pg_catalog.english'

#------------------------------------------------------------------------------
# PERFORMANCE FOR ODOO
#------------------------------------------------------------------------------
# Odoo uses a lot of JOINs
join_collapse_limit = 12
from_collapse_limit = 12

# Parallel query (PostgreSQL 15)
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2
