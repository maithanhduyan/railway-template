name: Build and Push PostgreSQL Images

on:
  schedule:
    - cron: "0 0 * * 1"  # Every Monday at midnight UTC
  push:
    paths:
      - "templates/odoo-19.0/postgres/**"
      - ".github/workflows/postgres.yml"
      - "templates/odoo-19.0/postgres/get-postgres-version.sh"
  workflow_dispatch:

env:
  LATEST_POSTGRES_MAJOR: 17  # Change this to update which version gets tagged as 'latest'

jobs:
  build-postgres:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        postgres_major: [16, 17, 18]

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Check Dockerfile exists
        id: check_dockerfile
        run: |
          if [ ! -f "templates/odoo-19.0/postgres/Dockerfile.${{ matrix.postgres_major }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::No Dockerfile.${{ matrix.postgres_major }} found, skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Get latest PostgreSQL version
        if: steps.check_dockerfile.outputs.skip != 'true'
        id: get_version
        run: |
          chmod +x templates/odoo-19.0/postgres/get-postgres-version.sh
          MINOR_VERSION=$(templates/odoo-19.0/postgres/get-postgres-version.sh ${{ matrix.postgres_major }})
          echo "minor_version=${MINOR_VERSION}" >> $GITHUB_OUTPUT
          echo "Building PostgreSQL $MINOR_VERSION with tags: ${{ matrix.postgres_major }}, ${MINOR_VERSION}"

      - name: Set up QEMU
        if: steps.check_dockerfile.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_dockerfile.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to GitHub Container Registry
        if: steps.check_dockerfile.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push with multiple tags
        if: steps.check_dockerfile.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: templates/odoo-19.0/postgres/Dockerfile.${{ matrix.postgres_major }}
          platforms: linux/arm64,linux/amd64
          push: true
          build-args: |
            POSTGRES_VERSION=${{ steps.get_version.outputs.minor_version }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ matrix.postgres_major }}
            ghcr.io/${{ github.repository }}:${{ steps.get_version.outputs.minor_version }}
            ${{ matrix.postgres_major == env.LATEST_POSTGRES_MAJOR && format('ghcr.io/{0}:latest', github.repository) || '' }}
